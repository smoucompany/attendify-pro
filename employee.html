<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Attendify Pro — بوابة الموظف</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/assets/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/assets/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/pro-ui.css">
  <style>
    /* ═══════════════════════════════════════════════
       ATTENDIFY PRO — EMPLOYEE PORTAL — PREMIUM UI
    ═══════════════════════════════════════════════ */
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --primary-bg: rgba(99,102,241,0.09);
      --primary-bg2: rgba(99,102,241,0.15);
      --success: #10b981;
      --success-bg: rgba(16,185,129,0.09);
      --danger: #ef4444;
      --danger-bg: rgba(239,68,68,0.09);
      --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.09);
      --info: #06b6d4;
      --info-bg: rgba(6,182,212,0.09);
      --bg: #f1f5f9;
      --bg-card: #ffffff;
      --bg-card2: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --radius: 20px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --shadow: 0 2px 16px rgba(15,23,42,0.06), 0 1px 4px rgba(15,23,42,0.04);
      --shadow-md: 0 4px 24px rgba(15,23,42,0.08), 0 2px 8px rgba(15,23,42,0.04);
      --shadow-lg: 0 12px 48px rgba(15,23,42,0.12), 0 4px 16px rgba(15,23,42,0.06);
      --shadow-primary: 0 8px 32px rgba(99,102,241,0.28);
      --shadow-success: 0 8px 32px rgba(16,185,129,0.28);
      --font: 'Cairo', sans-serif;
      --transition: all .22s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --bg: #0b1120;
      --bg-card: #161e2e;
      --bg-card2: #1a2236;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #253047;
      --border-light: #1e2a40;
      --shadow: 0 2px 16px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.35);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.45);
      --shadow-primary: 0 8px 32px rgba(99,102,241,0.35);
      --primary-bg: rgba(99,102,241,0.14);
      --primary-bg2: rgba(99,102,241,0.22);
      --success-bg: rgba(16,185,129,0.12);
      --danger-bg: rgba(239,68,68,0.12);
      --warning-bg: rgba(245,158,11,0.12);
      --info-bg: rgba(6,182,212,0.12);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:var(--font);
      background:var(--bg);
      color:var(--text-primary);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      transition:background .3s,color .3s;
      overscroll-behavior:none;
    }
    button { cursor:pointer; border:none; background:none; font-family:var(--font); -webkit-tap-highlight-color:transparent; }
    input, select, textarea { font-family:var(--font); }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    /* LOGIN */
    #emp-login {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 20px;
      background:#0f0c29;
      background:linear-gradient(145deg, #1a1040 0%, #302060 35%, #4c1a8a 65%, #1e3a6e 100%);
      position:relative;
      overflow:hidden;
    }
    .login-blob {
      position:absolute;
      border-radius:50%;
      filter:blur(60px);
      opacity:.35;
      animation:blobFloat 12s ease-in-out infinite;
      pointer-events:none;
    }
    .login-blob-1 {
      width:380px; height:380px;
      background:radial-gradient(circle, #6366f1, #8b5cf6);
      top:-80px; right:-80px;
    }
    .login-blob-2 {
      width:300px; height:300px;
      background:radial-gradient(circle, #06b6d4, #3b82f6);
      bottom:-60px; left:-60px;
      animation-delay:-4s; opacity:.28;
    }
    .login-blob-3 {
      width:220px; height:220px;
      background:radial-gradient(circle, #ec4899, #f59e0b);
      bottom:30%; right:-30px;
      animation-delay:-8s; opacity:.18;
    }
    @keyframes blobFloat {
      0%,100%{transform:translate(0,0) scale(1)}
      33%{transform:translate(20px,-30px) scale(1.05)}
      66%{transform:translate(-15px,20px) scale(.96)}
    }
    #emp-login::before {
      content:'';
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
    }
    .login-card {
      background:rgba(255,255,255,0.07);
      backdrop-filter:blur(32px) saturate(160%);
      -webkit-backdrop-filter:blur(32px) saturate(160%);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:28px;
      padding:40px 36px;
      width:100%; max-width:400px;
      box-shadow:0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
      position:relative; z-index:1;
    }
    .login-logo { text-align:center; margin-bottom:32px; }
    .login-logo .logo-icon {
      width:76px; height:76px;
      border-radius:22px;
      background:linear-gradient(135deg, rgba(99,102,241,0.6), rgba(139,92,246,0.6));
      border:1.5px solid rgba(255,255,255,0.2);
      display:inline-flex; align-items:center; justify-content:center;
      font-size:34px; color:white; margin-bottom:14px;
      box-shadow:0 8px 32px rgba(99,102,241,0.4);
      animation:logoPulse 4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100%{box-shadow:0 8px 32px rgba(99,102,241,0.4),0 0 0 0 rgba(139,92,246,0.3)}
      50%{box-shadow:0 8px 32px rgba(99,102,241,0.4),0 0 0 18px rgba(139,92,246,0)}
    }
    .login-logo h1 { color:white; font-size:22px; font-weight:900; letter-spacing:-.3px; }
    .login-logo p { color:rgba(255,255,255,.65); font-size:13px; margin-top:5px; }
    .login-tabs {
      display:flex; gap:5px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:14px; padding:4px; margin-bottom:22px;
    }
    .login-tab {
      flex:1; padding:9px; border-radius:10px;
      font-size:13px; font-weight:700;
      color:rgba(255,255,255,0.6);
      text-align:center; transition:var(--transition); cursor:pointer;
    }
    .login-tab.active { background:rgba(255,255,255,0.16); color:white; }
    .login-field { margin-bottom:14px; }
    .login-field label {
      display:block; color:rgba(255,255,255,0.85);
      font-size:12px; font-weight:700;
      letter-spacing:.3px; text-transform:uppercase; margin-bottom:7px;
    }
    .login-field-wrap { position:relative; }
    .login-field-icon {
      position:absolute; right:14px; top:50%; transform:translateY(-50%);
      color:rgba(255,255,255,0.45); font-size:15px; pointer-events:none;
    }
    [dir="ltr"] .login-field-icon { right:auto; left:14px; }
    .login-input {
      width:100%; padding:13px 42px 13px 16px;
      border-radius:12px;
      border:1.5px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.07);
      color:white; font-size:15px; font-family:var(--font);
      transition:var(--transition);
    }
    [dir="ltr"] .login-input { padding:13px 16px 13px 42px; }
    .login-input::placeholder { color:rgba(255,255,255,0.35); }
    .login-input:focus {
      outline:none;
      border-color:rgba(139,92,246,0.7);
      background:rgba(255,255,255,0.1);
      box-shadow:0 0 0 3px rgba(99,102,241,0.2);
    }
    .login-input option { color:#0f172a; background:white; }
    .btn-login {
      width:100%; padding:14px; border-radius:13px;
      background:linear-gradient(135deg, #6366f1, #8b5cf6);
      color:white; font-size:15px; font-weight:800; font-family:var(--font);
      margin-top:6px; transition:var(--transition);
      box-shadow:0 6px 24px rgba(99,102,241,0.5);
      position:relative; overflow:hidden;
    }
    .btn-login::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity:0; transition:opacity .2s;
    }
    .btn-login:hover::after { opacity:1; }
    .btn-login:hover { transform:translateY(-1px); box-shadow:0 10px 32px rgba(99,102,241,0.55); }
    .btn-login:active { transform:translateY(0); }
    .login-divider {
      display:flex; align-items:center; gap:10px;
      margin:16px 0 14px;
      color:rgba(255,255,255,0.35); font-size:11px; font-weight:600;
    }
    .login-divider::before, .login-divider::after {
      content:''; flex:1; height:1px; background:rgba(255,255,255,0.1);
    }
    .biometric-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .btn-biometric {
      padding:11px 8px; border-radius:12px;
      border:1.5px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.8);
      font-family:var(--font); font-size:12px; font-weight:700;
      display:flex; align-items:center; justify-content:center; gap:7px;
      transition:var(--transition); cursor:pointer;
    }
    .btn-biometric i { font-size:15px; }
    .btn-biometric:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.22); }
    .login-footer {
      text-align:center; margin-top:20px;
      color:rgba(255,255,255,0.45); font-size:12px;
    }
    .login-footer a { color:rgba(255,255,255,0.65); text-decoration:none; font-weight:700; }
    .login-hint {
      text-align:center;
      color:rgba(255,255,255,0.6);
      font-size:12px;
      margin-top:16px;
    }
    .login-hint strong { color:rgba(255,255,255,0.9); }

    /* APP SHELL */
    #emp-app { display:none; }
    .emp-header {
      background:var(--bg-card);
      border-bottom:1px solid var(--border);
      padding:0 18px; height:58px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
      box-shadow:0 1px 0 var(--border), 0 4px 16px rgba(0,0,0,0.04);
    }
    .emp-header-left { display:flex; align-items:center; gap:10px; }
    .emp-header-logo { display:flex; align-items:center; gap:10px; font-size:16px; font-weight:800; color:var(--primary); }
    .emp-header-logo i { font-size:20px; }
    .emp-header-logo-icon {
      width:34px; height:34px; border-radius:10px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; color:white; flex-shrink:0;
    }
    .emp-header-brand { display:flex; flex-direction:column; }
    .emp-header-brand-name { font-size:14px; font-weight:900; color:var(--text-primary); line-height:1.2; }
    .emp-header-brand-sub { font-size:10px; color:var(--text-muted); font-weight:600; }
    .emp-header-actions { display:flex; align-items:center; gap:6px; }
    .hdr-btn {
      width:36px; height:36px; border-radius:10px;
      color:var(--text-secondary);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; transition:var(--transition);
    }
    .hdr-btn:hover { background:var(--primary-bg); color:var(--primary); }
    .emp-avatar-btn {
      width:36px; height:36px; border-radius:11px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:white;
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:15px;
      box-shadow:0 2px 10px rgba(99,102,241,0.4);
      cursor:pointer; border:2px solid rgba(255,255,255,0.2);
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      height:68px; background:var(--bg-card);
      border-top:1px solid var(--border);
      display:flex; align-items:center;
      z-index:100; padding:0 4px;
      padding-bottom:env(safe-area-inset-bottom, 0px);
      box-shadow:0 -8px 32px rgba(0,0,0,0.07);
    }
    .bnav-item {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:3px; padding:6px 4px 8px;
      color:var(--text-muted); font-size:10px; font-weight:700;
      transition:var(--transition); position:relative;
      border-radius:14px; cursor:pointer;
    }
    .bnav-item.active { color:var(--primary); }
    .bnav-icon {
      width:44px; height:28px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; transition:var(--transition);
    }
    .bnav-item.active .bnav-icon {
      background:var(--primary-bg); color:var(--primary);
    }
    .bnav-badge {
      position:absolute; top:4px;
      background:var(--danger); color:white;
      font-size:9px; font-weight:800;
      min-width:16px; height:16px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      padding:0 4px; inset-inline-start:calc(50% + 8px);
    }

    /* PAGE CONTENT */
    .emp-content {
      padding:16px 16px 88px;
      max-width:580px; margin:0 auto;
    }

    /* CARDS */
    .card {
      background:var(--bg-card); border-radius:var(--radius);
      box-shadow:var(--shadow); overflow:hidden; margin-bottom:14px;
      border:1px solid var(--border-light);
    }
    .card-body { padding:18px; }

    /* GREETING CARD */
    .greeting-card {
      background:linear-gradient(135deg, #4f46e5 0%, #6d28d9 50%, #7c3aed 100%);
      border-radius:var(--radius); padding:20px;
      color:white; margin-bottom:14px;
      position:relative; overflow:hidden;
      box-shadow:0 8px 32px rgba(79,70,229,0.35);
    }
    .greeting-card::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 90% 10%, rgba(255,255,255,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 10% 90%, rgba(99,102,241,0.3) 0%, transparent 50%);
    }
    .greeting-top {
      display:flex; align-items:center; justify-content:space-between;
      position:relative; z-index:1; margin-bottom:14px;
    }
    .greeting-emp { display:flex; align-items:center; gap:12px; }
    .greeting-avatar {
      width:46px; height:46px; border-radius:14px;
      background:rgba(255,255,255,0.2);
      border:1.5px solid rgba(255,255,255,0.25);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:900; color:white;
      backdrop-filter:blur(8px); flex-shrink:0;
    }
    .greeting-sub { font-size:12px; opacity:.75; font-weight:600; }
    .greeting-name { font-size:18px; font-weight:900; letter-spacing:-.3px; }
    .greeting-right { text-align:end; }
    .greeting-clock {
      font-size:26px; font-weight:900;
      font-variant-numeric:tabular-nums;
      letter-spacing:-1px; line-height:1;
    }
    .greeting-date { font-size:11px; opacity:.75; margin-top:3px; font-weight:600; }
    .greeting-bottom {
      position:relative; z-index:1;
      display:flex; align-items:center; justify-content:space-between;
    }
    .greeting-status {
      display:inline-flex; align-items:center; gap:7px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:50px; padding:6px 14px;
      font-size:12px; font-weight:700;
    }
    .status-dot {
      width:7px; height:7px; border-radius:50%; background:white;
      animation:blink 1.8s ease-in-out infinite;
    }
    .status-dot.inactive { opacity:.4; animation:none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .greeting-shift-badge {
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:20px; padding:5px 12px;
      font-size:11px; font-weight:700;
      display:flex; align-items:center; gap:5px; opacity:.85;
    }

    /* STATS ROW */
    .stats-row {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:10px; margin-bottom:14px;
    }
    .stat-mini {
      background:var(--bg-card); border-radius:var(--radius-sm);
      padding:14px 10px 12px; text-align:center;
      box-shadow:var(--shadow); border:1px solid var(--border-light);
      position:relative; overflow:hidden;
    }
    .stat-mini::before {
      content:''; position:absolute;
      top:0; left:0; right:0; height:3px; border-radius:3px 3px 0 0;
    }
    .stat-mini.s-green::before { background:var(--success); }
    .stat-mini.s-yellow::before { background:var(--warning); }
    .stat-mini.s-blue::before { background:var(--primary); }
    .stat-mini-icon { font-size:18px; margin-bottom:5px; display:block; }
    .stat-mini-val { font-size:22px; font-weight:900; line-height:1; margin-bottom:4px; }
    .stat-mini-label { font-size:10px; color:var(--text-muted); font-weight:700; }

    /* CHECK-IN WIDGET */
    .checkin-card {
      background:var(--bg-card); border-radius:var(--radius);
      border:1px solid var(--border-light); box-shadow:var(--shadow);
      margin-bottom:14px; overflow:hidden;
    }
    .checkin-header {
      padding:16px 18px 0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .checkin-title { font-size:13px; font-weight:800; color:var(--text-secondary); }
    .checkin-live {
      display:flex; align-items:center; gap:5px;
      font-size:11px; font-weight:700; color:var(--success);
      background:var(--success-bg); border-radius:20px; padding:3px 10px;
    }
    .checkin-live-dot {
      width:6px; height:6px; border-radius:50%; background:var(--success);
      animation:blink 1.5s ease-in-out infinite;
    }
    .checkin-widget { padding:20px 18px 22px; text-align:center; }
    .checkin-ring {
      width:176px; height:176px; border-radius:50%;
      margin:0 auto 20px;
      display:flex; align-items:center; justify-content:center;
      position:relative; cursor:pointer;
      transition:transform .18s cubic-bezier(.34,1.56,.64,1);
    }
    .checkin-ring:active { transform:scale(.94); }
    .ring-bg {
      position:absolute; inset:0; border-radius:50%;
      background:conic-gradient(var(--success) var(--progress,0%), var(--border) 0%);
    }
    .ring-bg-track {
      position:absolute; inset:10px; border-radius:50%; background:var(--bg-card);
    }
    .ring-inner {
      position:absolute; inset:14px; border-radius:50%;
      background:var(--bg-card);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:3px;
      box-shadow:0 4px 20px rgba(0,0,0,0.06);
    }
    .checkin-ring.checked-out .ring-bg {
      background:conic-gradient(var(--primary) var(--progress,0%), var(--border) 0%);
    }
    .ring-icon {
      width:60px; height:60px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:24px;
      background:linear-gradient(135deg, #d1fae5, #a7f3d0);
      color:#059669;
      box-shadow:0 4px 16px rgba(16,185,129,0.25);
      transition:var(--transition);
    }
    .checked-out .ring-icon {
      background:linear-gradient(135deg, #e0e7ff, #c7d2fe);
      color:#4f46e5;
      box-shadow:0 4px 16px rgba(99,102,241,0.25);
    }
    [data-theme="dark"] .ring-icon {
      background:rgba(16,185,129,0.15); color:var(--success);
    }
    [data-theme="dark"] .checked-out .ring-icon {
      background:var(--primary-bg); color:var(--primary);
    }
    .ring-label { font-size:12px; font-weight:800; color:var(--text-secondary); }
    .ring-sublabel { font-size:11px; color:var(--text-muted); font-weight:600; }

    .checkin-methods {
      display:flex; gap:8px; justify-content:center; margin-bottom:16px;
    }
    .method-btn {
      flex:1; max-width:90px; padding:10px 6px;
      border-radius:var(--radius-sm);
      border:1.5px solid var(--border);
      background:var(--bg); color:var(--text-secondary);
      font-size:11px; font-weight:700;
      display:flex; flex-direction:column; align-items:center; gap:5px;
      transition:var(--transition); font-family:var(--font); cursor:pointer;
    }
    .method-btn i { font-size:18px; }
    .method-btn:hover { border-color:var(--primary); color:var(--primary); }
    .method-btn.active {
      border-color:var(--primary); background:var(--primary-bg);
      color:var(--primary); box-shadow:0 0 0 3px var(--primary-bg2);
    }
    .btn-checkin {
      width:100%; padding:15px; border-radius:var(--radius-sm);
      background:linear-gradient(135deg,#10b981,#059669);
      color:white; font-size:15px; font-weight:800; font-family:var(--font);
      transition:var(--transition); box-shadow:var(--shadow-success);
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-checkin.checkout {
      background:linear-gradient(135deg,#6366f1,#4f46e5);
      box-shadow:var(--shadow-primary);
    }
    .btn-checkin:hover { transform:translateY(-2px); }
    .btn-checkin:active { transform:translateY(0); }
    .biometric-checkin-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .btn-bio-checkin {
      padding:10px 6px; border-radius:var(--radius-xs);
      background:var(--bg); border:1.5px solid var(--border);
      color:var(--text-secondary);
      font-family:var(--font); font-size:12px; font-weight:700;
      display:flex; align-items:center; justify-content:center; gap:6px;
      cursor:pointer; transition:var(--transition);
    }
    .btn-bio-checkin i { font-size:14px; }
    .btn-bio-checkin:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-bg); }

    /* TODAY GRID */
    .today-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;
    }
    .today-cell {
      background:var(--bg-card); border-radius:var(--radius-sm);
      padding:14px; box-shadow:var(--shadow); border:1px solid var(--border-light);
    }
    .today-cell-icon {
      width:32px; height:32px; border-radius:9px;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; margin-bottom:8px;
    }
    .today-cell-label { font-size:10px; font-weight:700; color:var(--text-muted); margin-bottom:2px; }
    .today-cell-val { font-size:15px; font-weight:900; color:var(--text-primary); }

    /* QUICK ACTIONS */
    .quick-actions-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;
    }
    .quick-action-btn {
      background:var(--bg-card); border-radius:var(--radius-sm);
      padding:16px 14px; box-shadow:var(--shadow);
      border:1px solid var(--border-light);
      display:flex; align-items:center; gap:12px;
      text-align:start; cursor:pointer;
      transition:var(--transition); font-family:var(--font);
    }
    .quick-action-btn:hover {
      transform:translateY(-2px); box-shadow:var(--shadow-md);
      border-color:var(--border);
    }
    .quick-action-btn:active { transform:translateY(0); }
    .quick-action-icon {
      width:42px; height:42px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:19px; flex-shrink:0;
    }
    .quick-action-label { font-size:13px; font-weight:800; color:var(--text-primary); line-height:1.3; }
    .quick-action-sub { font-size:10px; color:var(--text-muted); font-weight:600; margin-top:1px; }

    /* SECTION TITLE */
    .section-title {
      font-size:13px; font-weight:800; color:var(--text-secondary);
      margin-bottom:10px;
      display:flex; align-items:center; gap:7px;
      text-transform:uppercase; letter-spacing:.4px;
    }
    .section-title i { color:var(--primary); font-size:13px; }

    /* ATTENDANCE TIMELINE */
    .att-timeline { list-style:none; }
    .att-item {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; border-radius:var(--radius-sm);
      margin-bottom:6px; background:var(--bg-card2);
      border:1px solid var(--border-light); transition:var(--transition);
    }
    .att-item:hover { border-color:var(--border); }
    .att-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .att-dot.in { background:var(--success); }
    .att-dot.out { background:var(--primary); }
    .att-dot.absent { background:var(--danger); }
    .att-dot.late { background:var(--warning); }
    .att-icon {
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; flex-shrink:0;
    }
    .att-icon.in { background:var(--success-bg); color:var(--success); }
    .att-icon.out { background:var(--primary-bg); color:var(--primary); }
    .att-icon.absent { background:var(--danger-bg); color:var(--danger); }
    .att-icon.late { background:var(--warning-bg); color:var(--warning); }
    .att-date { font-size:11px; color:var(--text-muted); font-weight:600; min-width:52px; }
    .att-info { flex:1; }
    .att-label { font-size:13px; font-weight:800; color:var(--text-primary); }
    .att-times { font-size:11px; color:var(--text-muted); margin-top:1px; }
    .att-dur {
      font-size:11px; font-weight:800; color:var(--text-secondary);
      background:var(--bg); border:1px solid var(--border);
      padding:3px 9px; border-radius:20px; white-space:nowrap;
    }

    /* LEAVE BALANCE */
    .balance-item {
      display:flex; align-items:center; gap:12px;
      padding:12px 0; border-bottom:1px solid var(--border-light);
    }
    .balance-item:last-child { border-bottom:none; }
    .balance-icon {
      width:38px; height:38px; border-radius:11px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .balance-info { flex:1; }
    .balance-type { font-size:13px; font-weight:800; color:var(--text-primary); }
    .balance-bar-wrap {
      height:5px; background:var(--border);
      border-radius:5px; margin-top:6px; overflow:hidden;
    }
    .balance-bar { height:100%; border-radius:5px; transition:width .9s cubic-bezier(.4,0,.2,1); }
    .balance-days { font-size:14px; font-weight:900; white-space:nowrap; }

    /* FORMS */
    .form-group { margin-bottom:14px; }
    .form-group label {
      display:block; font-size:12px; font-weight:700;
      color:var(--text-secondary); margin-bottom:6px;
      text-transform:uppercase; letter-spacing:.3px;
    }
    .form-input {
      width:100%; padding:12px 14px; border-radius:var(--radius-xs);
      border:1.5px solid var(--border); background:var(--bg-card2);
      color:var(--text-primary); font-size:14px;
      font-family:var(--font); transition:var(--transition);
    }
    .form-input:focus {
      outline:none; border-color:var(--primary);
      box-shadow:0 0 0 3px var(--primary-bg);
    }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn-submit {
      width:100%; padding:14px; border-radius:var(--radius-sm);
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:white; font-size:15px; font-weight:800; font-family:var(--font);
      box-shadow:var(--shadow-primary); transition:var(--transition);
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-submit:hover { transform:translateY(-2px); }

    /* PROFILE */
    .profile-header {
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      padding:28px 20px 20px; text-align:center; color:white;
    }
    .profile-hero {
      background:linear-gradient(135deg, #4f46e5, #7c3aed);
      padding:30px 20px 24px; text-align:center; color:white;
      position:relative; overflow:hidden;
    }
    .profile-hero::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.12) 0%, transparent 50%);
    }
    .profile-avatar-wrap { position:relative; display:inline-block; margin-bottom:14px; }
    .profile-avatar {
      width:82px; height:82px; border-radius:24px;
      background:rgba(255,255,255,0.2);
      border:2px solid rgba(255,255,255,0.3);
      display:inline-flex; align-items:center; justify-content:center;
      font-size:32px; font-weight:900; color:white;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      backdrop-filter:blur(8px);
    }
    .profile-status-ring {
      position:absolute; bottom:4px; right:4px;
      width:14px; height:14px; border-radius:50%;
      background:var(--success); border:2px solid rgba(79,70,229,0.9);
    }
    .profile-name { font-size:20px; font-weight:900; letter-spacing:-.3px; }
    .profile-role { font-size:13px; opacity:.8; margin-top:3px; font-weight:600; }
    .profile-badges {
      display:flex; gap:8px; justify-content:center;
      margin-top:10px; flex-wrap:wrap;
    }
    .profile-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:20px; padding:5px 12px;
      font-size:11px; font-weight:700;
    }
    .info-row {
      display:flex; align-items:center; gap:12px;
      padding:13px 0; border-bottom:1px solid var(--border-light);
    }
    .info-row:last-child { border-bottom:none; }
    .info-icon {
      width:38px; height:38px; border-radius:11px;
      background:var(--primary-bg); color:var(--primary);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0;
    }
    .info-label { font-size:11px; color:var(--text-muted); font-weight:600; }
    .info-val { font-size:14px; font-weight:700; color:var(--text-primary); margin-top:1px; }
    .btn-logout-emp {
      width:100%; padding:13px; border-radius:var(--radius-sm);
      background:var(--danger-bg); color:var(--danger);
      font-size:14px; font-weight:800; font-family:var(--font);
      display:flex; align-items:center; justify-content:center; gap:8px;
      cursor:pointer; transition:var(--transition); margin-top:8px;
      border:1.5px solid rgba(239,68,68,0.2);
    }
    .btn-logout-emp:hover { background:var(--danger); color:white; }

    /* MODALS */
    .modal-overlay {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(6px);
      z-index:200; display:none;
    }
    .modal-overlay.open { display:flex; align-items:flex-end; justify-content:center; }
    .modal-sheet {
      background:var(--bg-card);
      border-radius:24px 24px 0 0;
      width:100%; max-width:580px; max-height:88vh;
      overflow-y:auto; padding:8px 20px 24px;
      animation:slideUp .28s cubic-bezier(.34,1.06,.64,1);
    }
    @keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-handle {
      width:36px; height:4px; border-radius:3px;
      background:var(--border); margin:12px auto 16px;
    }
    .modal-title {
      font-size:16px; font-weight:900; color:var(--text-primary);
      margin-bottom:18px; display:flex; align-items:center; gap:10px;
    }
    .modal-title i { color:var(--primary); }

    /* VERIFY MODALS */
    .verify-icon {
      width:100px; height:100px; border-radius:50%;
      margin:0 auto 16px;
      display:flex; align-items:center; justify-content:center; font-size:40px;
    }
    .gps-ring {
      position:relative; width:100px; height:100px;
      border-radius:50%; background:var(--success-bg); color:var(--success);
    }
    .gps-ring::before, .gps-ring::after {
      content:''; position:absolute; inset:-12px; border-radius:50%;
      border:2px solid var(--success); opacity:0;
      animation:gpsPulse 2s ease-out infinite;
    }
    .gps-ring::after { animation-delay:.7s; }
    @keyframes gpsPulse { 0%{inset:-4px;opacity:.6} 100%{inset:-28px;opacity:0} }
    .qr-frame {
      width:160px; height:160px; margin:0 auto 16px;
      border-radius:16px; background:var(--bg); border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:60px; position:relative; overflow:hidden;
    }
    .qr-scan-line {
      position:absolute; inset:0 0 auto; height:3px;
      background:linear-gradient(90deg,transparent,var(--primary),transparent);
      animation:qrScan 2s ease-in-out infinite;
    }
    @keyframes qrScan { 0%{top:0} 50%{top:calc(100% - 3px)} 100%{top:0} }
    .face-circle {
      width:120px; height:120px; border-radius:50%;
      margin:0 auto 16px; background:var(--primary-bg);
      display:flex; align-items:center; justify-content:center;
      font-size:48px; position:relative;
      border:3px solid var(--primary);
      animation:facePulse 2s ease-in-out infinite;
    }
    @keyframes facePulse {
      0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.4)}
      50%{box-shadow:0 0 0 20px rgba(99,102,241,0)}
    }
    .verify-status { text-align:center; font-size:14px; font-weight:800; color:var(--text-secondary); margin-bottom:6px; }
    .verify-sub { text-align:center; font-size:12px; color:var(--text-muted); margin-bottom:20px; }

    /* TOAST */
    .toast-wrap {
      position:fixed; top:68px; right:0; left:0;
      display:flex; flex-direction:column;
      align-items:center; gap:8px;
      z-index:999; pointer-events:none; padding:0 16px;
    }
    .toast {
      background:var(--bg-card); border-radius:14px; padding:12px 18px;
      font-size:13px; font-weight:700;
      box-shadow:0 8px 40px rgba(0,0,0,0.18), 0 1px 0 var(--border);
      display:flex; align-items:center; gap:10px;
      animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events:all; max-width:400px;
      border:1px solid var(--border-light);
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(-20px) scale(.9)} to{opacity:1;transform:translateY(0) scale(1)} }
    .toast.success i { color:var(--success); }
    .toast.error i { color:var(--danger); }
    .toast.info i { color:var(--info); }
    .toast.warning i { color:var(--warning); }

    /* ADMIN LINK */
    .admin-link {
      position:fixed; bottom:78px; inset-inline-end:16px;
      background:var(--bg-card); color:var(--primary);
      border-radius:14px; padding:9px 14px;
      font-size:12px; font-weight:800;
      display:flex; align-items:center; gap:6px;
      text-decoration:none; box-shadow:var(--shadow-md);
      border:1.5px solid var(--primary-bg2); z-index:90;
    }

    /* PAGE HEADER */
    .page-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px; padding-top:2px;
    }
    .page-header h2 { font-size:20px; font-weight:900; color:var(--text-primary); }
    .page-header p { font-size:12px; color:var(--text-muted); font-weight:600; margin-top:1px; }

    /* EMPTY STATE */
    .empty { text-align:center; padding:40px 20px; color:var(--text-muted); }
    .empty-icon {
      width:72px; height:72px; border-radius:20px;
      background:var(--bg); border:1px solid var(--border);
      display:inline-flex; align-items:center; justify-content:center;
      font-size:30px; margin-bottom:14px;
    }
    .empty h3 { font-size:15px; font-weight:800; color:var(--text-secondary); margin-bottom:4px; }
    .empty p { font-size:13px; }
    .empty i { font-size:40px; margin-bottom:10px; opacity:.4; display:block; }

    /* COMPAT */
    .btn { display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:var(--transition); }
    .btn-primary { background:var(--primary);color:white; }
    .btn-primary:hover { background:var(--primary-dark); }
    .btn-secondary { background:var(--border,#e2e8f0);color:var(--text-secondary,#475569); }
    .btn-secondary:hover { background:#d1d5db; }
    .btn-sm { padding:6px 12px;font-size:12px; }
    .loading-spinner { display:inline-block;width:20px;height:20px;border:2.5px solid rgba(99,102,241,.25);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<script>
/* ============================================================
   EMPLOYEE PORTAL — CORE
   ============================================================ */

let currentEmp = null;
let checkedIn  = false;
let checkInTime = null;
let selectedMethod = 'face';
let currentPage = 'home';

/* ── THEME ── */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-icon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
  localStorage.setItem('emp-theme', html.dataset.theme);
}
(function initTheme() {
  const t = localStorage.getItem('emp-theme') || 'light';
  document.documentElement.dataset.theme = t;
  const icon = document.getElementById('theme-icon');
  if (icon) icon.className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
})();


function switchLoginTab(type, btn) {

/* ── LOGIN ── */
async function empLogin(e) {
  e.preventDefault();
  const pass = document.getElementById('emp-pass').value;
  if (!pass) return showToast('أدخل كلمة المرور', 'error');

  const emailInput = document.getElementById('emp-email').value.trim();
  const code       = document.getElementById('emp-code').value.trim();

  if (!emailInput && !code) return showToast('أدخل كود الموظف', 'error');

  const btn = document.querySelector('#emp-login-form .btn-login');
  if (btn) { btn.disabled = true; btn.textContent = 'جارٍ التحقق...'; }

  const restore = () => { if (btn) { btn.disabled = false; btn.textContent = 'دخول'; } };

  // 1️⃣ Try backend (works across all devices)
  let networkFailed = false;
  try {
    const body = emailInput ? { email: emailInput, password: pass } : { empNo: code, password: pass };
    const res  = await fetch('/api/emp/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const json = await res.json().catch(() => ({}));
    if (res.ok && json.ok) {
      restore();
      return _loginEmp(json.emp);
    }
    // Server responded (any status) → show its error and stop
    restore();
    return showToast(json.error || 'بيانات الدخول غير صحيحة', 'error');
  } catch(_) {
    // Network error (offline / server unreachable) → fall through to localStorage
    networkFailed = true;
  }

  if (!networkFailed) return; // shouldn't reach here

  // 2️⃣ Offline fallback: localStorage (same device as admin)
  let emp;
  if (emailInput) {
    emp = DB.employees.find(x => x.email?.toLowerCase() === emailInput.toLowerCase());
    if (!emp) { restore(); return showToast('البريد الإلكتروني غير موجود (وضع بدون إنترنت)', 'error'); }
  } else {
    emp = DB.employees.find(x => x.no === code || x.no === code.padStart(3,'0') || String(x.no).toUpperCase() === code.toUpperCase());
    if (!emp) { restore(); return showToast('لا يوجد اتصال بالإنترنت — تحقق من الشبكة', 'error'); }
  }
  const validPass = emp.password || emp.no;
  if (pass !== validPass) { restore(); return showToast('كلمة المرور غير صحيحة', 'error'); }

  restore();
  _loginEmp(emp);
}

/* ── BIOMETRIC LOGIN ── */
async function empBiometricLogin(type) {
  if (type === 'fingerprint') {
    if (!Biometrics.canWebAuthn()) {
      showToast('جهازك لا يدعم البصمة البيومترية', 'error');
      return;
    }
    // Find employee by code field
    const code = document.getElementById('emp-code')?.value?.trim();
    if (!code) { showToast('أدخل كود الموظف أولاً ثم اضغط بصمة الإصبع', 'warning'); return; }
    const emp = DB.employees.find(x => x.no === code || x.no === code.padStart(3,'0'));
    if (!emp) { showToast('كود الموظف غير صحيح', 'error'); return; }
    if (!Biometrics.hasFingerprint(emp.id)) { showToast('لم يتم تسجيل البصمة لهذا الموظف — سجّل البصمة من لوحة الإدارة', 'warning'); return; }
    Biometrics.openFingerprintVerify(emp, () => _loginEmp(emp));
  } else {
    if (!Biometrics.canCamera()) { showToast('الكاميرا غير متاحة', 'error'); return; }
    const hasAny = DB.employees.some(e => Biometrics.hasStoredFace(e.id));
    if (!hasAny) { showToast('لا توجد بصمات وجه مسجّلة — سجّل من لوحة الإدارة', 'warning'); return; }
    Biometrics.openFaceVerify({
      onSuccess: (name) => {
        const emp = DB.employees.find(e => e.name === name);
        if (emp) _loginEmp(emp);
        else showToast('لم يُعثر على الموظف', 'error');
      },
      onFail: () => showToast('لم يتم التعرف — حاول مرة أخرى', 'error'),
    });
  }
}

function _loginEmp(emp) {
  currentEmp = emp;
  sessionStorage.setItem('emp-session', JSON.stringify(emp));
  document.getElementById('emp-login').style.display = 'none';
  document.getElementById('emp-app').style.display = 'block';
  const initials = (emp.name||'م').split(' ').map(w=>w[0]).slice(0,2).join('');
  document.getElementById('hdr-avatar').textContent = emp.avatar || initials || '?';
  const companyEl = document.getElementById('hdr-company-name');
  if (companyEl && DB.settings?.companyName) companyEl.textContent = DB.settings.companyName;

  goPage('home');
  showToast(`أهلاً ${emp.name} 👋`, 'success');

  // جلب بيانات الموظف الحديثة من السيرفر (حضور، ورديات، إجازات)
  fetch(`/api/emp/data/${emp.id}`)
    .then(r => r.ok ? r.json() : null)
    .then(json => {
      if (!json?.ok) return;
      // حفظ الحضور في DB المحلي حتى تعمل صفحة الحضور بشكل صحيح
      if (json.attendance?.length) {
        json.attendance.forEach(rec => {
          if (!DB.attendance.find(a => a.empId === rec.empId && a.date === rec.date))
            DB.attendance.push(rec);
        });
      }
      if (json.shifts?.length)      { DB.shifts.length = 0;      json.shifts.forEach(r => DB.shifts.push(r)); }
      if (json.departments?.length) { DB.departments.length = 0; json.departments.forEach(r => DB.departments.push(r)); }
      if (json.leaves?.length) {
        json.leaves.forEach(rec => {
          if (!DB.leaves.find(l => l.id === rec.id)) DB.leaves.push(rec);
        });
      }
      // تحديث حالة الحضور اليوم
      const todayStr = new Date().toISOString().split('T')[0];
      const todayRec = DB.attendance.find(a => a.empId === emp.id && a.date === todayStr);
      if (todayRec?.checkIn && !todayRec.checkOut) { checkedIn = true; checkInTime = todayRec.checkIn; }
      goPage('home'); // إعادة رسم الصفحة بالبيانات المحدّثة
    })
    .catch(() => {
      // لا يوجد اتصال — استخدم ما هو محلي
      const todayStr = new Date().toISOString().split('T')[0];
      const todayRec = DB.attendance.find(a => a.empId === emp.id && a.date === todayStr);
      if (todayRec?.checkIn && !todayRec.checkOut) { checkedIn = true; checkInTime = todayRec.checkIn; }
    });
}

/* ── LOGOUT ── */
function empLogout() {
  if (!confirm('هل تريد تسجيل الخروج؟')) return;
  sessionStorage.removeItem('emp-session');
  currentEmp = null; checkedIn = false; checkInTime = null;
  document.getElementById('emp-app').style.display = 'none';

}

/* ── NAVIGATION ── */
function goPage(page, btn) {
  currentPage = page;
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`[data-page="${page}"]`)?.classList.add('active');

  const content = document.getElementById('emp-content');
  const pages = { home: renderHome, history: renderHistory, leaves: renderLeaves, myloans: renderMyLoans, profile: renderProfile };
  (pages[page] || renderHome)(content);
  content.scrollTop = 0;
}

/* ── BIOMETRIC CHECK-IN (Real) ── */
async function handleBiometricCheckin(type) {
  if (!currentEmp) return;

  if (type === 'fingerprint') {
    if (!Biometrics.canWebAuthn()) { showToast('جهازك لا يدعم البصمة', 'error'); return; }
    if (!Biometrics.hasFingerprint(currentEmp.id)) {
      showToast('لم تُسجَّل بصمتك — راجع مدير النظام', 'warning'); return;
    }
    Biometrics.openFingerprintVerify(currentEmp, () => _doCheckin('fingerprint'));
  } else {
    if (!Biometrics.canCamera()) { showToast('الكاميرا غير متاحة', 'error'); return; }
    if (!Biometrics.hasStoredFace(currentEmp.id)) {
      showToast('لم تُسجَّل بصمة وجهك — راجع مدير النظام', 'warning'); return;
    }
    Biometrics.openFaceVerify({
      empId: currentEmp.id,
      onSuccess: () => _doCheckin('face'),
      onFail: () => showToast('لم يتم التعرف — حاول مرة أخرى', 'error'),
    });
  }
}

function _doCheckin(method) {
  const now = new Date();
  const nowStr = now.toTimeString().slice(0, 5);
  const today  = now.toISOString().split('T')[0];

  if (!checkedIn) {
    checkedIn  = true;
    checkInTime = nowStr;

    // Save to DB
    const existing = DB.attendance.find(a => a.empId === currentEmp.id && a.date === today);
    if (!existing) {
      const shift = DB.shifts?.find(s => s.id === currentEmp.shift);
      const workStart = shift?.startTime || '08:00';
      const [wh, wm] = workStart.split(':').map(Number);
      const [nh, nm] = nowStr.split(':').map(Number);
      const lateMin = Math.max(0, (nh*60+nm) - (wh*60+wm));
      DB.attendance.unshift({
        id: DB.nextId('a'), empId: currentEmp.id, date: today,
        checkIn: nowStr, checkOut: null, method,
        status: lateMin > 15 ? 'late' : 'present',
        lateMin: lateMin || null, overtime: null,
      });
    }
    showToast('✅ تم تسجيل حضورك — ' + formatTime12(nowStr), 'success');
    // مزامنة مع Supabase
    _syncAttendance({ empId: currentEmp.id, date: today, checkIn: nowStr, method,
      status: DB.attendance.find(a=>a.empId===currentEmp.id&&a.date===today)?.status || 'present',
      lateMin: DB.attendance.find(a=>a.empId===currentEmp.id&&a.date===today)?.lateMin || null });
  } else {
    checkedIn = false;
    const dur = calcDuration(checkInTime, nowStr);

    // Update checkOut locally
    const rec = DB.attendance.find(a => a.empId === currentEmp.id && a.date === today);
    if (rec) rec.checkOut = nowStr;

    showToast(`👋 تم تسجيل انصرافك — مدة العمل ${dur}`, 'success');
    // مزامنة مع Supabase
    _syncAttendance({ empId: currentEmp.id, date: today, checkOut: nowStr });
    checkInTime = null;
  }
  goPage('home');
}

/* ── SYNC ATTENDANCE TO SUPABASE ── */
function _syncAttendance(payload) {
  fetch('/api/emp/checkin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  }).catch(() => {}); // لا نوقف المستخدم إذا فشل الاتصال
}

function submitLeave(e) {
  e.preventDefault();
  const d = Object.fromEntries(new FormData(e.target));
  if (!d.from || !d.to) return showToast('أدخل التواريخ', 'error');
  const days = Math.ceil((new Date(d.to)-new Date(d.from))/(1000*60*60*24))+1;
  DB.leaves.push({
    id: DB.nextId('leave'),
    empId: currentEmp.id,
    type: d.type,
    from: d.from,
    to: d.to,
    days,
    reason: d.reason || '',
    status: 'pending',
    appliedOn: new Date().toISOString().split('T')[0],
  });
  showToast('✅ تم إرسال طلب الإجازة للمراجعة', 'success');
  renderLeaves(document.getElementById('emp-content'));
}

function getMyStats() {
  const myAtt = DB.attendance.filter(a => a.empId === currentEmp.id);

  return {
    present: myAtt.filter(a=>a.status==='present'||a.status==='late').length,

    leaveBalance: (bal.annual||21) - (bal.annualUsed||0),
  };
}

function getProgressPercent() {
  if (!checkedIn || !checkInTime) return 0;
  const now = new Date();
  const [h,m] = checkInTime.split(':').map(Number);
  const startMs = new Date().setHours(h,m,0,0);
  const elapsed = (now - startMs) / 1000 / 60;
  return Math.min(100, (elapsed / (8*60)) * 100);
}

function getElapsedHours() {
  if (!checkInTime) return '—';
  const now = new Date();
  const [h,m] = checkInTime.split(':').map(Number);
  const diff = (now - new Date().setHours(h,m,0,0)) / 1000 / 60;
  const hrs  = Math.floor(diff / 60);
  const mins = Math.floor(diff % 60);
  return `${hrs}س ${mins}د`;
}

function calcDuration(from, to) {
  const [h1,m1] = (from||'').split(':').map(Number);
  const [h2,m2] = (to||'').split(':').map(Number);
  const diff = (h2*60+m2) - (h1*60+m1);
  if (isNaN(diff) || diff <= 0) return '—';
  return `${Math.floor(diff/60)}س ${diff%60}د`;
}

function formatTime(d) {
  return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
function formatTime12(t) {
  if (!t) return '—';
  const [h,m] = t.split(':').map(Number);
  const ampm = h < 12 ? 'ص' : 'م';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;
}
function formatDateAr(d) {
  return d.toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long'});
}
function formatDateShort(str) {
  const d = new Date(str);
  return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'});
}

let clockInterval;
function startEmpClock() {
  clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    const el = document.getElementById('emp-clock');
    if (el) el.textContent = formatTime(new Date());
    else clearInterval(clockInterval);
    const sub = document.getElementById('ring-sub');
    if (sub && checkedIn) sub.textContent = getElapsedHours();
  }, 1000);
}

/* ── HELPER: GRATUITY CALC ── */
function calcEmpGratuity(emp, type) {
  if (!emp.hireDate) return { years:0, gratuity:0, eligible:false };
  const hire  = new Date(emp.hireDate);
  const end   = new Date();
  const years = Math.max(0, (end - hire) / (365.25 * 24 * 3600 * 1000));
  const sal   = emp.salary || 0;
  let g = Math.min(years,5)*(sal/2) + Math.max(0,years-5)*sal;
  if (type==='resign') {
    if (years<2) g=0;
    else if (years<5) g*=1/3;
    else if (years<10) g*=2/3;
  }
  if (type==='termination' && years<0.5) g=0;
  return { years:Math.round(years*10)/10, gratuity:Math.round(g), eligible:g>0 };
}

  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {success:'circle-check',error:'circle-xmark',info:'circle-info'};
  t.innerHTML = `<i class="fas fa-${icons[type]||'circle-info'}"></i><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(-8px)'; setTimeout(()=>t.remove(),300); }, 3000);
}

/* ── INIT DB + RESUME SESSION ── */
(function resumeSession() {
  // Load DB from localStorage so departments/data are available
  try { DB.loadFromLocal(); } catch(_) {}

  const saved = sessionStorage.getItem('emp-session');
  if (saved) {
    try {
      currentEmp = JSON.parse(saved);
      // Refresh employee data from DB in case it was updated
      const fresh = DB.employees.find(e => e.id === currentEmp.id);
      if (fresh) currentEmp = fresh;
      document.getElementById('emp-login').style.display = 'none';
      document.getElementById('emp-app').style.display = 'block';
      document.getElementById('hdr-avatar').textContent = currentEmp.avatar;
      goPage('home');
    } catch(e) { sessionStorage.removeItem('emp-session'); }
  }
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
    window.addEventListener('online',  () => showToast('✅ عاد الاتصال بالإنترنت', 'success'));
    window.addEventListener('offline', () => showToast('📵 لا إنترنت — البيانات محلية', 'warning'));
  }
</script>
